name: Run PyTests

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      GRAFANA_LOW_ACCESS_USER: ${{ secrets.GRAFANA_LOW_ACCESS_USER }}
      GRAFANA_LOW_ACCESS_PASSWORD: ${{ secrets.GRAFANA_LOW_ACCESS_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Cleanup previous containers and reports
        run: |
          docker compose down -v --remove-orphans || true
          rm -rf allure-results allure-report || true

      - name: Build test-runner
        run: docker compose build test-runner

      - name: Start Grafana
        run: docker compose up -d grafana

      - name: Wait for Grafana health
        run: |
          for i in {1..30}; do
            response=$(curl -s http://localhost:3000/api/health || true)
            echo "$response"
            if echo "$response" | grep -q '"database":"ok"'; then
              exit 0
            fi
            sleep 5
          done

          docker compose logs grafana
          exit 1

      - name: Run pytest in test-runner
        run: docker compose run --rm test-runner

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results)" ]; then
            allure generate allure-results -o allure-report --clean
          else
            mkdir -p allure-report
            cat <<'EOF' > allure-report/index.html
            <html>
              <body>
                <h1>No allure results generated</h1>
              </body>
            </html>
            EOF
          fi

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Final cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

name: Run Performance Tests

on:
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      LOCUST_USERS: 30
      LOCUST_SPAWN_RATE: 5
      LOCUST_RUN_TIME: 4m
      LOCUST_WARMUP_REQUESTS: 2
      LOCUST_ENABLE_SUMMARY: "true"
      METRICS_SAMPLE_INTERVAL_SECONDS: 10
      METRICS_SAMPLE_DURATION_SECONDS: 250

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start required services
        run: docker compose up -d --build grafana mysql redis dashboard-hub prometheus

      - name: Wait for services
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          endpoints = [
              ('Grafana', 'http://localhost:3000/api/health'),
              ('Dashboard Hub', 'http://localhost:8000/health'),
          ]

          for name, url in endpoints:
              for attempt in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=3) as response:
                          payload = json.loads(response.read().decode('utf-8'))
                          status = payload.get('status') or payload.get('database')
                          if status in ('ok', 'healthy'):
                              print(f'{name} is ready')
                              break
                  except Exception as exc:
                      print(f'Waiting for {name}... attempt {attempt + 1}/60: {exc}')
                  time.sleep(2)
              else:
                  raise SystemExit(f'{name} did not become ready in time')
          PY

      - name: Create performance seed data
        env:
          GRAFANA_BASE_URL: http://localhost:3000
          DASHBOARD_HUB_BASE_URL: http://localhost:8000
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: admin
          LOCUST_DASHBOARD_COUNT: 5
        run: python perf/bootstrap_perf_data.py --github-env "$GITHUB_ENV"

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "locust>=2.31,<3" "gevent>=24.2.1" "zope.event>=5.0" "zope.interface>=7.0"
          python - <<'PY'
          import locust
          import gevent
          import zope.event
          import zope.interface
          print('Locust dependencies installed successfully')
          PY

      - name: Collect metrics before load
        run: |
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py \
            --metrics-url http://localhost:8000/metrics \
            --output perf-results/metrics-before.json

      - name: Run Locust headless and sample metrics during load
        env:
          LOCUST_DASHBOARD_UIDS: ${{ env.LOCUST_DASHBOARD_UIDS }}
          LOCUST_SHARE_TOKENS: ${{ env.LOCUST_SHARE_TOKENS }}
          LOCUST_CONFLICT_USER_LOGIN: ${{ env.LOCUST_CONFLICT_USER_LOGIN }}
          LOCUST_WARMUP_REQUESTS: ${{ env.LOCUST_WARMUP_REQUESTS }}
          LOCUST_ENABLE_SUMMARY: ${{ env.LOCUST_ENABLE_SUMMARY }}
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          python perf/sample_metrics_during_load.py \
            --metrics-url http://localhost:8000/metrics \
            --interval-seconds "$METRICS_SAMPLE_INTERVAL_SECONDS" \
            --duration-seconds "$METRICS_SAMPLE_DURATION_SECONDS" \
            --output perf-results/metrics-series.json &
          METRICS_SAMPLER_PID=$!

          locust -f perf/locustfile.py \
            --host http://localhost:8000 \
            --headless \
            -u "$LOCUST_USERS" -r "$LOCUST_SPAWN_RATE" -t "$LOCUST_RUN_TIME" \
            --csv=perf-results/locust \
            --html=perf-results/locust-report.html

          wait "$METRICS_SAMPLER_PID"

      - name: Collect metrics after load
        if: always()
        run: |
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py \
            --metrics-url http://localhost:8000/metrics \
            --output perf-results/metrics-after.json

      - name: Assert performance thresholds
        run: |
          . .venv/bin/activate
          python perf/assert_locust_thresholds.py --csv perf-results/locust_stats.csv

      - name: Collect container logs on failure
        if: failure()
        run: |
          mkdir -p perf-results
          docker compose logs > perf-results/docker-compose.log || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

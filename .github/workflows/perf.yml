name: Run Performance Tests

on:
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start required services
        run: docker compose up -d --build grafana mysql redis dashboard-hub

      - name: Wait for Dashboard Hub
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt locust

      - name: Run Locust headless
        run: |
          locust -f perf/locustfile.py \
            --host http://localhost:8000 \
            --headless \
            -u 5 -r 1 -t 1m

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
